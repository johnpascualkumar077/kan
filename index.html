<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>観</title>
<meta name="theme-color" content="#0C0B08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="観">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0C0B08;
  --surface: #141210;
  --border:  #201E18;
  --stone:   #524F44;
  --muted:   #8A8474;
  --text:    #D4CFBF;
  --bright:  #EDE8DC;
  --gold:    #C4A06A;
  --glow:    rgba(196,160,106,0.12);
  --gold2:   #7A6240;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body {
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Serif JP',serif;
  font-weight:300;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
.scr {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  opacity:0; pointer-events:none;
  transition:opacity 0.5s ease;
}
.scr.on { opacity:1; pointer-events:all; }
.area {
  flex:1; overflow-y:auto; overflow-x:hidden;
  display:flex; flex-direction:column; align-items:center;
  padding:48px 28px 24px;
  -webkit-overflow-scrolling:touch;
}
.nav {
  flex-shrink:0; display:flex; justify-content:center;
  border-top:1px solid var(--border); background:var(--bg);
  padding-bottom:env(safe-area-inset-bottom, 0);
}
.nb {
  flex:1; max-width:110px; padding:14px 8px 16px;
  background:none; border:none; color:var(--stone);
  font-family:'Noto Serif JP',serif; font-size:20px; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  transition:color 0.3s;
}
.nb span { font-family:'EB Garamond',serif; font-size:9px; letter-spacing:2px; text-transform:uppercase; }
.nb.on { color:var(--gold); }

/* ── MANDALA ── */
@keyframes pulse-dot { 0%,100%{ r:8; opacity:.9; } 50%{ r:10; opacity:1; } }
.today-pulse { animation: pulse-dot 2s ease-in-out infinite; }

/* ── ANIMATIONS ── */
@keyframes arise { from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:translateY(0); } }
.a1{ animation:arise .7s .0s ease both; }
.a2{ animation:arise .7s .12s ease both; }
.a3{ animation:arise .7s .24s ease both; }
.a4{ animation:arise .7s .36s ease both; }
.a5{ animation:arise .7s .48s ease both; }
@keyframes breathe { 0%,100%{ transform:scale(1); opacity:.75; } 50%{ transform:scale(1.04); opacity:1; } }
.breathe{ animation:breathe 4s ease-in-out infinite; }

/* ── TYPOGRAPHY ── */
.label { font-family:'EB Garamond',serif; font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--stone); }
.italic-muted { font-family:'EB Garamond',serif; font-style:italic; font-size:14px; color:var(--stone); text-align:center; }

/* ── CARD ── */
.card { background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:24px; width:100%; max-width:340px; margin-bottom:24px; }
.card .cl { font-family:'EB Garamond',serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--stone); display:block; margin-bottom:12px; }
.card .ct { font-size:15px; font-weight:300; color:var(--bright); line-height:2; }
.card .cs { font-size:13px; font-weight:200; color:var(--muted); line-height:2; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }

/* ── BUTTON ── */
.btn { background:none; border:1px solid var(--gold2); color:var(--gold); font-family:'Noto Serif JP',serif; font-weight:300; font-size:14px; padding:15px 48px; border-radius:2px; cursor:pointer; letter-spacing:2px; transition:all .25s ease; width:100%; max-width:280px; }
.btn:hover,.btn:active { background:var(--gold2); border-color:var(--gold); color:var(--bright); }

/* ── DOTS ── */
.dots { display:flex; gap:12px; }
.dot { width:13px; height:13px; border-radius:50%; border:1px solid var(--stone); cursor:pointer; transition:all .2s; background:transparent; }
.dot.on { background:var(--gold); border-color:var(--gold); box-shadow:0 0 10px var(--glow); }

/* ── TEXTAREA ── */
.ta { background:transparent; border:none; border-bottom:1px solid var(--border); color:var(--text); font-family:'Noto Serif JP',serif; font-weight:200; font-size:15px; padding:14px 0; width:100%; max-width:320px; resize:none; outline:none; line-height:2; text-align:center; min-height:72px; }
.ta::placeholder{ color:var(--stone); }

/* ── CALENDAR GRID ── */
.cg { display:grid; grid-template-columns:repeat(7,1fr); gap:7px; width:100%; max-width:320px; margin:24px 0; }
.cd { aspect-ratio:1; border-radius:50%; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'EB Garamond',serif; font-size:12px; color:var(--stone); transition:all .3s; }
.cd.done { background:var(--gold2); border-color:var(--gold2); color:var(--gold); }
.cd.today { border-color:var(--gold); color:var(--bright); }
.cd.done.today { background:var(--gold); border-color:var(--gold); color:var(--bg); }

/* ── STATS ── */
.stats { display:flex; gap:36px; margin-bottom:32px; }
.stat { text-align:center; }
.sn { font-family:'EB Garamond',serif; font-size:38px; color:var(--gold); line-height:1; }
.sl { font-family:'EB Garamond',serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--stone); margin-top:6px; }

/* ── MISC ── */
.phase { font-family:'EB Garamond',serif; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gold2); border:1px solid var(--border); padding:4px 14px; margin-bottom:20px; }
.sep { width:1px; height:32px; background:var(--border); margin:16px auto; }
.ck { font-size:96px; font-weight:200; color:var(--gold); line-height:1; text-align:center; }
.cm { font-size:15px; font-weight:200; color:var(--muted); line-height:2.4; text-align:center; max-width:270px; margin-top:28px; }

/* ── INSIGHT ── */
.iblock { background:var(--surface); border:1px solid var(--border); padding:22px 24px; width:100%; max-width:320px; margin-bottom:20px; text-align:center; }
.iblock .il { font-family:'EB Garamond',serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--stone); margin-bottom:12px; }
.iblock .iv { font-family:'EB Garamond',serif; font-size:44px; color:var(--gold); line-height:1; }
.ne { border-bottom:1px solid var(--border); padding:14px 0; text-align:left; width:100%; max-width:320px; }
.ne .nt { font-size:13px; font-weight:200; color:var(--muted); line-height:1.9; }
.ne .nd { font-family:'EB Garamond',serif; font-size:11px; color:var(--stone); margin-top:4px; }
#cc { font-family:'EB Garamond',serif; font-size:12px; letter-spacing:2px; color:var(--gold); margin-top:12px; opacity:0; transition:opacity .4s; }

/* ── EXPAND ── */
.expand-btn { background:none; border:none; color:var(--stone); font-family:'EB Garamond',serif; font-size:12px; letter-spacing:2px; cursor:pointer; padding:8px 0; transition:color .3s; }
.expand-btn:hover { color:var(--gold); }
.expand-panel { max-height:0; overflow:hidden; transition:max-height .4s ease; width:100%; max-width:320px; }
.expand-panel.open { max-height:900px; }

/* ── TAGS ── */
.tags { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
.tag { background:var(--surface); border:1px solid var(--border); color:var(--stone); font-family:'Noto Serif JP',serif; font-size:12px; font-weight:200; padding:7px 14px; border-radius:2px; cursor:pointer; transition:all .2s; }
.tag.on { border-color:var(--gold2); color:var(--gold); background:rgba(196,160,106,0.08); }

/* ── DIST HINT ── */
#dist-hint { font-family:'EB Garamond',serif; font-size:11px; letter-spacing:1px; color:var(--stone); margin-top:8px; opacity:0; transition:opacity .4s; }

/* ── CHARTS ── */
.wave-wrap { width:100%; max-width:320px; margin-bottom:24px; }
.wave-wrap svg { width:100%; height:auto; }
.ring-wrap { width:160px; height:160px; margin:0 auto 24px; }
.ring-wrap svg { width:100%; height:100%; }
.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; width:100%; max-width:280px; }
.bar-label { font-size:11px; font-weight:200; color:var(--muted); width:80px; text-align:right; flex-shrink:0; }
.bar-track { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; background:var(--gold2); border-radius:3px; transition:width .6s ease; }
.bar-count { font-family:'EB Garamond',serif; font-size:13px; color:var(--stone); width:20px; flex-shrink:0; }

/* ── DATA MANAGEMENT ── */
.data-row { display:flex; gap:20px; justify-content:center; margin-top:36px; padding-top:24px; border-top:1px solid var(--border); }
.data-btn { background:none; border:none; color:var(--stone); font-family:'EB Garamond',serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; padding:6px 0; transition:color .3s; }
.data-btn:hover { color:var(--gold); }

/* ── ONBOARDING ── */
.ob-input {
  background:transparent; border:none; border-bottom:1px solid var(--border);
  color:var(--bright); font-family:'Noto Serif JP',serif; font-weight:200;
  font-size:22px; padding:12px 0; width:100%; max-width:220px;
  outline:none; text-align:center; letter-spacing:3px;
}
.ob-input::placeholder { color:var(--stone); font-size:15px; letter-spacing:1px; }
.intent-opt {
  background:var(--surface); border:1px solid var(--border);
  padding:16px 20px; width:100%; max-width:300px; border-radius:2px;
  cursor:pointer; text-align:left; transition:all .25s;
}
.intent-opt .io-label { font-size:14px; font-weight:300; color:var(--text); margin-bottom:5px; }
.intent-opt .io-hint { font-family:'EB Garamond',serif; font-style:italic; font-size:12px; color:var(--stone); }
.intent-opt.on { border-color:var(--gold2); background:rgba(196,160,106,0.06); }
.intent-opt.on .io-label { color:var(--gold); }
.swatch-row { display:flex; gap:18px; justify-content:center; margin:24px 0; }
.swatch {
  width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-family:'Noto Serif JP',serif; font-weight:200; font-size:18px;
  cursor:pointer; border:2px solid transparent; transition:all .25s;
}
.swatch.on { border-color:var(--bright); box-shadow:0 0 16px var(--glow); }

/* ── ADAPTIVE INSIGHT ── */
.insight-personal {
  background:var(--surface); border:1px solid var(--border);
  border-left:2px solid var(--gold2); padding:18px 20px;
  width:100%; max-width:320px; margin-bottom:20px; text-align:left;
}
.insight-personal p { font-size:13px; font-weight:200; color:var(--muted); line-height:2.2; margin-bottom:8px; }
.insight-personal p:last-child { margin-bottom:0; }

/* ── INTENT BADGE ── */
.intent-badge {
  font-family:'EB Garamond',serif; font-size:10px; letter-spacing:2px;
  color:var(--gold2); border:1px solid var(--gold2); padding:3px 10px;
  margin-bottom:16px; display:inline-block;
}

/* ── SETTINGS ── */
.settings-panel { max-height:0; overflow:hidden; transition:max-height .5s ease; width:100%; max-width:320px; }
.settings-panel.open { max-height:700px; }
.settings-section { padding:20px 0 8px; display:flex; flex-direction:column; align-items:center; gap:14px; }
.settings-input {
  background:transparent; border:none; border-bottom:1px solid var(--border);
  color:var(--text); font-family:'Noto Serif JP',serif; font-weight:200;
  font-size:16px; padding:8px 0; width:100%; max-width:200px; outline:none; text-align:center;
}
</style>
</head>
<body>

<!-- TODAY -->
<div class="scr on" id="s-today">
  <div class="area" id="today"></div>
  <nav class="nav">
    <button class="nb on" onclick="go('today')">観<span>Today</span></button>
    <button class="nb"    onclick="go('cal')">波<span>Record</span></button>
    <button class="nb"    onclick="go('insight')">識<span>Insight</span></button>
  </nav>
</div>

<!-- CALENDAR -->
<div class="scr" id="s-cal">
  <div class="area" id="cal"></div>
  <nav class="nav">
    <button class="nb"    onclick="go('today')">観<span>Today</span></button>
    <button class="nb on" onclick="go('cal')">波<span>Record</span></button>
    <button class="nb"    onclick="go('insight')">識<span>Insight</span></button>
  </nav>
</div>

<!-- INSIGHT -->
<div class="scr" id="s-insight">
  <div class="area" id="insight"></div>
  <nav class="nav">
    <button class="nb"    onclick="go('today')">観<span>Today</span></button>
    <button class="nb"    onclick="go('cal')">波<span>Record</span></button>
    <button class="nb on" onclick="go('insight')">識<span>Insight</span></button>
  </nav>
</div>

<script>
// ═══════════════════════════════════
// 30 DAYS
// ═══════════════════════════════════
const D=[
  {k:'観',p:'外を観る',   m:'SNSで最初に感情が動いた投稿を一つ記憶する',              s:'その投稿を見たとき、胸・腹・喉のどこかが反応したか気づく',  c:'正念 · Sati'},
  {k:'感',p:'内を感じる', m:'今日、自分が「つい」やってしまったことを一つ観察する',    s:'それをやる前に一瞬の衝動があったかに気づく',               c:'無明 · Avijjā'},
  {k:'空',p:'空を感じる', m:'当たり前だと思っている何かを意識的に見る',               s:'それがなかったらどうか、一秒だけ想像する',                 c:'空 · Śūnyatā'},
  {k:'無',p:'手放す',     m:'「こうあるべき」と思った瞬間を記録する',                  s:'その「べき」を声に出さずに手放す練習をする',               c:'無執着 · Aparigraha'},
  {k:'流',p:'流れを見る', m:'バズっているコンテンツがなぜ広まったか一つ考える',        s:'感情 → 拡散 の連鎖を頭の中でトレースする',                c:'縁起 · Pratītyasamutpāda'},
  {k:'息',p:'呼吸に戻る', m:'今日、3回だけ「深呼吸のきっかけ」を意識的に作る',        s:'画面を開く前に一息。それだけ。',                          c:'入出息念 · Ānāpānasati'},
  {k:'苦',p:'苦を知る',   m:'小さな「嫌だ」を見逃さない。感情の数を数える',           s:'嫌だと思ったとき、逃げる前に2秒だけ留まる',               c:'苦 · Dukkha'},
  {k:'慈',p:'慈しむ',     m:'誰か一人の立場から世界を見る瞬間を作る',                 s:'その人はなぜそう考えるのか。批判なしに想像する',            c:'慈悲 · Karuṇā'},
  {k:'今',p:'今に在る',   m:'食事中にスマホを一度置く。それだけでいい',               s:'口の中の味に30秒だけ全注意を向ける',                      c:'刹那 · Kṣaṇa'},
  {k:'見',p:'偏りを見る', m:'自分の意見と反対側の意見を一つ探して読む',               s:'反発を感じても、最後まで読む',                             c:'確証バイアス · Confirmation'},
  {k:'常',p:'無常を感じる',m:'変化した何かに気づく。天気でも気分でも関係でも',         s:'それを変えようとするのをやめ、ただ確認する',               c:'無常 · Anicca'},
  {k:'執',p:'執着を観る', m:'何かに執着しているとき「これは一時的だ」と言う',          s:'好きなコンテンツを途中でやめる練習を一回する',             c:'渇愛 · Taṇhā'},
  {k:'語',p:'言葉を観る', m:'「みんな」「絶対」「最悪」を使った投稿を観察する',        s:'その言葉が感情をどう増幅しているか考える',                 c:'正語 · Sammā Vācā'},
  {k:'身',p:'身体に戻る', m:'姿勢が悪くなった瞬間を一度だけ気づく',                   s:'気づいた瞬間、ゆっくり背筋を伸ばす。それだけ',             c:'身念処 · Kāyānupassanā'},
  {k:'間',p:'間を作る',   m:'返信を10分だけ意図的に遅らせる一回を作る',               s:'衝動的な反応と考えた反応の違いに気づく',                   c:'正定 · Sammā Samādhi'},
  {k:'比',p:'比較を観る', m:'「あの人は〇〇だ」と思った瞬間を記録する',               s:'その比較が自分にとって何の役に立つか問う',                 c:'無我 · Anattā'},
  {k:'恐',p:'恐れを観る', m:'今日、避けていることを一つ特定する',                     s:'避けている理由が恐れなら、その恐れを一言書く',             c:'五蓋 · Pañca Nīvaraṇa'},
  {k:'望',p:'欲望を観る', m:'「欲しい」と思ったものをリストアップする',               s:'そのうち本当に必要なものはいくつか考える',                 c:'少欲知足 · Santuṭṭhi'},
  {k:'集',p:'集中する',   m:'一つの作業を30分だけ通知ゼロでやる',                     s:'途中で別のことを考えたら気づき、戻る。それだけ',           c:'正精進 · Sammā Vāyāma'},
  {k:'初',p:'初心に戻る', m:'よく知っているものを初めて見るように眺める',             s:'「これは何だろう」と子供のように問う',                     c:'初心 · Shoshin'},
  {k:'連',p:'連鎖を観る', m:'自分の感情がどこから来たか遡って考える',                 s:'感情 → きっかけ → その前は？と3ステップ遡る',            c:'縁起 · Chain of Cause'},
  {k:'静',p:'静寂を作る', m:'3分だけ何も見ない・聞かない時間を作る',                  s:'不快でもいい。ただ、沈黙の中にいる',                       c:'止 · Samatha'},
  {k:'受',p:'受け入れる', m:'コントロールできないことに一回気づく',                   s:'「これは私にはどうにもならない」と声に出す',               c:'平静 · Upekkha'},
  {k:'選',p:'選択を観る', m:'「何となく」やったことを一つ特定する',                   s:'それは本当に選んだか、惰性だったか考える',                 c:'正思惟 · Sammā Saṅkappa'},
  {k:'足',p:'在ることに気づく',m:'機能していて気づかない何かを意識する',              s:'それがない世界を20秒だけ想像する',                         c:'知足 · Santuṭṭhi'},
  {k:'抵',p:'抵抗を観る', m:'「やりたくない」と感じた瞬間を観察する',                 s:'その感覚を批判せず「抵抗がある」と名前をつける',            c:'正見 · Sammā Diṭṭhi'},
  {k:'言',p:'内語を観る', m:'自分への批判的な内語が出たら気づく',                     s:'「また出た」とユーモアをもって観察する',                   c:'慈 · Mettā'},
  {k:'終',p:'終わりを感じる',m:'この一日が最後だったら何を大切にするか考える',        s:'その答えを今日の小さな行動に一つ反映する',                 c:'死念 · Maraṇasati'},
  {k:'中',p:'中道を歩む', m:'極端な判断（最高/最悪）を一回留保する',                  s:'「どちらでもある」と言える何かを探す',                     c:'中道 · Majjhimā Paṭipadā'},
  {k:'帰',p:'始まりに戻る',m:'今日、何も特別なことをしなくていい。ただ在る',          s:'起きて、息をして、それだけでいいと一回思う',               c:'涅槃 · Nirvāṇa'},
];

// ═══════════════════════════════════
// PERSONALIZATION CONFIG
// ═══════════════════════════════════
const THEMES = {
  gold:   { gold:'#C4A06A', gold2:'#7A6240', label:'金' },
  jade:   { gold:'#6AA070', gold2:'#3D6B4A', label:'翠' },
  indigo: { gold:'#6A7AC4', gold2:'#3D4B8A', label:'藍' },
  rose:   { gold:'#C46A7A', gold2:'#8A3D4A', label:'紅' },
};
const INTENTS = [
  { id:'sns',     label:'SNSと距離を置く',       hint:'SNSの引力から、自由になる',       frame:'SNS上の観察を続けよう' },
  { id:'emotion', label:'感情を安定させる',       hint:'ゆらぎを観察し、乗りこなす',      frame:'感情の動きを細かく感じよう' },
  { id:'bias',    label:'認知バイアスを理解する', hint:'思考の歪みを知り、自由になる',    frame:'認知の歪みがどこに現れるか観よう' },
  { id:'observe', label:'ただ、観察する',         hint:'目的なく、ただ在る練習をする',    frame:'ただ在ることで十分だ' },
];

function applyTheme(accent){
  const t=THEMES[accent]||THEMES.gold;
  const r=document.documentElement;
  r.style.setProperty('--gold',t.gold);
  r.style.setProperty('--gold2',t.gold2);
  const h=t.gold, ri=parseInt(h.slice(1,3),16), gi=parseInt(h.slice(3,5),16), bi=parseInt(h.slice(5,7),16);
  r.style.setProperty('--glow',`rgba(${ri},${gi},${bi},0.12)`);
}

const save=s=>localStorage.setItem(SK,JSON.stringify(s));
const today=()=>new Date().toISOString().split('T')[0];
const dateFor=(i,start)=>{ if(!start) return ''; const d=new Date(start); d.setDate(d.getDate()+i); return d.toISOString().split('T')[0]; };
const dayIdx=(s)=>{ if(!s.startDate) return 0; const diff=Math.floor((new Date(today())-new Date(s.startDate))/86400000); return Math.min(diff,D.length-1); };

];

// ═══════════════════════════════════
// HELPERS
// ═══════════════════════════════════
function greeting(name){
  const hr=new Date().getHours();
  if(!name) return '';
  if(hr<12) return `おはよう、${name}。`;
  if(hr<17) return `こんにちは、${name}。`;
  return `おかえり、${name}。`;
}

function calcStreak(entries){
  const done=entries.filter(([,v])=>v.evening_done).map(([d])=>d).sort().reverse();
  if(!done.length) return 0;
  let streak=0, check=today();
  for(const d of done){
    if(d===check){ streak++; const dt=new Date(check); dt.setDate(dt.getDate()-1); check=dt.toISOString().split('T')[0]; }
    else if(d<check) break;
  }
  return streak;
}

function adaptiveInsight(entries, profile){
  if(!profile||entries.length<3) return '';
  const pc={greed:0,anger:0,delusion:0};
  const dc={};
  let totalR=0, countR=0;
  entries.forEach(([,v])=>{
    if(v.poison&&pc.hasOwnProperty(v.poison)) pc[v.poison]++;
    if(v.distortions) v.distortions.forEach(id=>dc[id]=(dc[id]||0)+1);
    if(v.reaction){ totalR+=v.reaction; countR++; }
  });
  const avgR=countR?totalR/countR:0;
  const topPoison=Object.entries(pc).sort((a,b)=>b[1]-a[1])[0];
  const topDist=Object.entries(dc).sort((a,b)=>b[1]-a[1])[0];
  const streak=calcStreak(entries);
  const msgs=[];
  const poisonMsgs={
    greed:'貪りへの気づきが多い。欲しいという感覚そのものを、批判せずに観察しよう。',
    anger:'瞋の反応が繰り返し現れている。怒りは情報だ。ただ「瞋がある」と名前をつけよう。',
    delusion:'癡（思い込み）が出やすい傾向がある。「本当にそうか？」と一息置いて問おう。'
  };
  if(topPoison&&topPoison[1]>0&&poisonMsgs[topPoison[0]]) msgs.push(poisonMsgs[topPoison[0]]);
  if(topDist&&topDist[1]>1){
    const dl=DISTORTIONS.find(d=>d.id===topDist[0])?.label;
    if(dl) msgs.push(`「${dl}」が繰り返し現れている。このパターンに気づくだけで、変化は始まる。`);
  }
  if(avgR>3.5) msgs.push('反応強度が全体的に高い。呼吸に戻る練習を意識的に増やしてみよう。');
  if(streak>=7) msgs.push(`${streak}日連続で記録している。継続そのものが、観察の力になる。`);
  else if(streak>=3) msgs.push(`${streak}日続いている。この積み重ねに気づこう。`);
  return msgs.join('\n');
}

// ═══════════════════════════════════
// SVG MANDALA
// ═══════════════════════════════════
function mandala(di,entries,startDate){
  const cx=110,cy=110,R=92,ri=40;
  let dots='';
  for(let i=0;i<30;i++){
    const a=(i/30)*2*Math.PI-Math.PI/2;
    const x=cx+R*Math.cos(a), y=cy+R*Math.sin(a);
    const date=dateFor(i,startDate);
    const done=entries&&entries[date]&&entries[date].evening_done;
    const isT=i===di;
    if(done) dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="6" fill="#7A6240" stroke="#C4A06A" stroke-width="1"/>`;
    else if(isT) dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="8" fill="#0C0B08" stroke="#C4A06A" stroke-width="1.5" class="today-pulse"/>`;
    else dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="5" fill="#161410" stroke="#201E18" stroke-width="1"/>`;
  }
  const ws=Math.floor(di/7)*7;
  for(let i=0;i<7;i++){
    const idx=ws+i;
    const a=(i/7)*2*Math.PI-Math.PI/2;
    const x=cx+ri*Math.cos(a), y=cy+ri*Math.sin(a);
    const date=dateFor(idx,startDate);
    const done=entries&&entries[date]&&entries[date].evening_done;
    const isT=idx===di;
    dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="${done?'#C4A06A':isT?'#201E18':'#141210'}" stroke="${done?'#C4A06A':isT?'#C4A06A':'#201E18'}" stroke-width="1"/>`;
  }
  const d=D[di%D.length];
  return `<svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
    <circle cx="110" cy="110" r="100" fill="none" stroke="#161410" stroke-width="1"/>
    <circle cx="110" cy="110" r="52" fill="none" stroke="#161410" stroke-width="1"/>
    ${dots}
    <text x="110" y="120" text-anchor="middle" font-family="'Noto Serif JP',serif" font-weight="200" font-size="44" fill="#EDE8DC">${d.k}</text>
  </svg>`;
}

function waveChart(allEntries,s){
  const W=300,H=100,pad=20, pts=[];
  for(let i=0;i<30;i++){
    const date=dateFor(i,s.startDate);
    const e=s.entries&&s.entries[date];
    if(e&&e.evening_done&&e.reaction){
      pts.push({x:pad+i*(W-2*pad)/29, y:H-pad-(e.reaction-1)*(H-2*pad)/4});
    }
  }
  if(pts.length<2) return '';
  let path=`M${pts[0].x},${pts[0].y}`;
  for(let i=1;i<pts.length;i++){
    const cp=(pts[i].x-pts[i-1].x)/3;
    path+=` C${pts[i-1].x+cp},${pts[i-1].y} ${pts[i].x-cp},${pts[i].y} ${pts[i].x},${pts[i].y}`;
  }
  const areaPath=path+` L${pts[pts.length-1].x},${H-pad} L${pts[0].x},${H-pad} Z`;
  let yLabels='';
  for(let v=1;v<=5;v++){
    const y2=H-pad-(v-1)*(H-2*pad)/4;
    yLabels+=`<text x="${pad-8}" y="${y2+3}" text-anchor="end" font-family="'EB Garamond',serif" font-size="9" fill="#524F44">${v}</text>`;
    yLabels+=`<line x1="${pad}" y1="${y2}" x2="${W-pad}" y2="${y2}" stroke="#201E18" stroke-width="0.5"/>`;
  }
  return `<div class="wave-wrap"><svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C4A06A" stop-opacity="0.2"/><stop offset="100%" stop-color="#C4A06A" stop-opacity="0"/></linearGradient></defs>
    ${yLabels}
    <path d="${areaPath}" fill="url(#wg)"/>
    <path d="${path}" fill="none" stroke="#C4A06A" stroke-width="1.5"/>
    ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#C4A06A"/>`).join('')}
  </svg></div>`;
}

function ringChart(entries){
  const counts={greed:0,anger:0,delusion:0,none:0};
  entries.forEach(([,v])=>{ if(v.poison&&counts.hasOwnProperty(v.poison)) counts[v.poison]++; else counts.none++; });
  const total=entries.length||1;
  const colors={greed:'#C4A06A',anger:'#8A6040',delusion:'#524F44',none:'#201E18'};
  const labels={greed:'貪',anger:'瞋',delusion:'癡',none:'空'};
  const cx=80,cy=80,R=65,r2=45;
  let arcs='',angle=-Math.PI/2;
  const sorted=Object.entries(counts).filter(([,c])=>c>0).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length) return '';
  sorted.forEach(([key,count])=>{
    const sweep=(count/total)*2*Math.PI; if(sweep<0.01) return;
    const x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    const x2=cx+R*Math.cos(angle+sweep),y2=cy+R*Math.sin(angle+sweep);
    const ix1=cx+r2*Math.cos(angle+sweep),iy1=cy+r2*Math.sin(angle+sweep);
    const ix2=cx+r2*Math.cos(angle),iy2=cy+r2*Math.sin(angle);
    arcs+=`<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${sweep>Math.PI?1:0} 1 ${x2.toFixed(1)},${y2.toFixed(1)} L${ix1.toFixed(1)},${iy1.toFixed(1)} A${r2},${r2} 0 ${sweep>Math.PI?1:0} 0 ${ix2.toFixed(1)},${iy2.toFixed(1)} Z" fill="${colors[key]}" opacity="0.85"/>`;
    angle+=sweep;
  });
  return `<div class="ring-wrap"><svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
    ${arcs}
    <text x="80" y="88" text-anchor="middle" font-family="'Noto Serif JP',serif" font-weight="200" font-size="28" fill="${colors[sorted[0][0]]}">${labels[sorted[0][0]]}</text>
  </svg></div>`;
}

function barChart(entries){
  const counts={};
  DISTORTIONS.forEach(d3=>counts[d3.id]=0);
  entries.forEach(([,v])=>{ if(v.distortions) v.distortions.forEach(id=>{if(counts.hasOwnProperty(id))counts[id]++;}); });
  const mx=Math.max(...Object.values(counts),1);
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([id,count])=>{
    const dd=DISTORTIONS.find(x=>x.id===id);
    return `<div class="bar-row"><div class="bar-label">${dd?dd.label:id}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/mx*100)}%"></div></div><div class="bar-count">${count}</div></div>`;
  }).join('');
}

function rInsight(){
  const s=load(), el=document.getElementById('insight');
  if(!s.startDate||!s.entries){
    el.innerHTML=`<div style="text-align:center;color:var(--stone);font-size:14px;line-height:2.4">夕の記録が溜まると<br>ここに洞察が現れます</div>`;
    return;
  }
  const entries=Object.entries(s.entries).filter(([,v])=>v.evening_done);
  if(!entries.length){
    el.innerHTML=`<div style="text-align:center;color:var(--stone);font-size:14px;line-height:2.4">記録がまだありません</div>`;
    return;
  }
  const avg=(entries.reduce((a,[,v])=>a+(v.reaction||0),0)/entries.length).toFixed(1);
  const notes=entries.filter(([,v])=>v.note).slice(-4);
  const di=dayIdx(s), d=D[di%D.length];
  const personal=adaptiveInsight(entries, s.profile);
  const name=s.profile?.name||'';

  _noteExport=`## 今週のSNS心理学解剖\n\n今週は${entries.length}件の観察を記録した。\n\n現在のテーマは「**${d.p}**」。${d.c}を軸に、日常とSNSの中に現れる認知の動きを観察している。\n${notes.length?'\n---\n\n記録した気づき：\n'+notes.map(([,v])=>`- 「${v.note}」`).join('\n')+'\n\n---\n\n':''}観察を続けると、感情の動きに一瞬の間が生まれる。その間に、選択がある。\n\n#SNS心理学 #認知バイアス #観察日記 #原始仏教`;

  const wave=waveChart(entries,s);
  const ring=ringChart(entries);
  const hasDistortions=entries.some(([,v])=>v.distortions&&v.distortions.length);
  const bars=hasDistortions?barChart(entries):'';

  el.innerHTML=`
  <div style="text-align:center;max-width:320px;padding-bottom:40px">
    <div class="a1 label" style="margin-bottom:8px">洞察</div>
    <div class="a2 italic-muted" style="margin-bottom:32px">${name?`${name}の `:''} ${d.p} の段階</div>
    ${personal?`
    <div class="insight-personal a2">
      ${personal.split('\n').map(p=>`<p>${p}</p>`).join('')}
    </div>`:''}
    <div class="iblock a3">
      <div class="il">平均反応強度</div>
      <div class="iv">${avg}<span style="font-size:18px;color:var(--stone)"> / 5</span></div>
    </div>
    ${wave?`<div class="a3"><div class="label" style="margin-bottom:12px">反応の波</div>${wave}</div>`:''}
    ${entries.some(([,v])=>v.poison)?`<div class="sep"></div><div class="a4"><div class="label" style="margin-bottom:16px">三毒の分布</div>${ring}</div>`:''}
    ${hasDistortions?`<div class="sep"></div><div class="a4" style="display:flex;flex-direction:column;align-items:center"><div class="label" style="margin-bottom:16px">認知の歪み</div>${bars}</div>`:''}
    ${notes.length?`
    <div class="sep"></div>
    <div style="width:100%;max-width:320px;margin-bottom:24px">
      <div class="a5 label" style="margin-bottom:16px;text-align:center">最近の気づき</div>
      ${notes.map(([date,v])=>`<div class="ne a5"><div class="nt">「${v.note}」</div><div class="nd">${date}</div></div>`).join('')}
    </div>`:''}
    <button class="btn a5" onclick="copyNote()" style="font-size:13px;padding:14px">note下書きをコピー</button>
    <div id="cc"></div>
  </div>`;
}

// ═══════════════════════════════════
// ACTIONS
// ═══════════════════════════════════
function accept(){
  const s=load(), t=today();
  if(!s.entries) s.entries={};
  s.entries[t]={...s.entries[t]||{}, morning_done:true};
  save(s); rToday();
}

function setR(v){
  _reaction=v;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i<v));
}

function toggleDeep(){
  const p=document.getElementById('deep-panel');
  if(p) p.classList.toggle('open');
}

function setPoison(id){
  _poison=(_poison===id)?null:id;
  document.querySelectorAll('#poison-tags .tag').forEach((t,i)=>t.classList.toggle('on',POISONS[i].id===id&&_poison===id));
}

function toggleDist(id){
  const idx=_distortions.indexOf(id);
  if(idx>=0){ _distortions.splice(idx,1); }
  else if(_distortions.length<2){ _distortions.push(id); }
  else{
    const hint=document.getElementById('dist-hint');
    if(hint){ hint.style.opacity='1'; setTimeout(()=>hint.style.opacity='0',1800); }
    return;
  }
  document.querySelectorAll('#dist-tags .tag').forEach((t,i)=>t.classList.toggle('on',_distortions.includes(DISTORTIONS[i].id)));
}

function submitE(){
  const s=load(), t=today();
  const note=(document.getElementById('ta')||{}).value||'';
  const reframe=(document.getElementById('reframe-ta')||{}).value||'';
  if(!s.entries) s.entries={};
  s.entries[t]={ ...s.entries[t]||{}, evening_done:true, reaction:_reaction, note:note.trim(), ts:Date.now(), poison:_poison||null, distortions:_distortions.length?[..._distortions]:[], reframe:reframe.trim()||null };
  save(s); rToday();
}

function copyNote(){
  if(!_noteExport) return;
  const showMsg=text=>{ const el=document.getElementById('cc'); if(el){el.textContent=text;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',2400);} };
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(_noteExport).then(()=>showMsg('コピーしました')).catch(()=>{ showMsg('コピー失敗'); prompt('手動でコピーしてください:',_noteExport); });
  } else { showMsg('コピー失敗'); prompt('手動でコピーしてください:',_noteExport); }
}

function exportData(){
  const blob=new Blob([JSON.stringify(load(),null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url; a.download='kan_backup_'+today()+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function importData(){
  const input=document.createElement('input');
  input.type='file'; input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.startDate||typeof data.startDate!=='string') throw new Error();
        save(data); if(data.profile?.accent) applyTheme(data.profile.accent); go('today');
      }catch{ alert('ファイルが正しくありません'); }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input); input.click(); document.body.removeChild(input);
}

function resetProgram(){
  const btn=document.getElementById('reset-btn'); if(!btn) return;
  if(btn.dataset.confirm!=='1'){
    btn.textContent='本当に削除する'; btn.dataset.confirm='1'; btn.style.color='#c44a4a';
    setTimeout(()=>{ if(btn.dataset.confirm==='1'){ btn.textContent='リセット'; btn.dataset.confirm='0'; btn.style.color=''; } },3000);
    return;
  }
  localStorage.removeItem(SK); go('today');
}

// ── Settings ──
function toggleSettings(){
  document.getElementById('settings-panel')?.classList.toggle('open');
}

let _sIntent='';
function settingsSelectIntent(id){
  _sIntent=id;
  document.querySelectorAll('#settings-panel .intent-opt').forEach(t=>t.classList.toggle('on',t.getAttribute('onclick')===`settingsSelectIntent('${id}')`));
}

function settingsSelectTheme(key){
  applyTheme(key);
  document.querySelectorAll('#settings-panel .swatch').forEach(t=>t.classList.toggle('on',t.dataset.skey===key));
  _sTheme=key;
}
let _sTheme='';

function saveSettings(){
  const s=load();
  const name=(document.getElementById('s-name')||{}).value?.trim()||s.profile?.name||'';
  const intent=_sIntent||s.profile?.intent||'sns';
  const accent=_sTheme||s.profile?.accent||'gold';
  s.profile={ ...s.profile||{}, name, intent, accent };
  save(s); applyTheme(accent); rCal();
}

// ═══════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════
function go(name){
  const tabs=['today','cal','insight'];
  tabs.forEach(n=>{
    document.getElementById('s-'+n).classList.toggle('on',n===name);
    document.querySelectorAll('#s-'+n+' .nb').forEach((b,j)=>b.classList.toggle('on',tabs[j]===name));
  });
  if(name==='today') rToday();
  if(name==='cal') rCal();
  if(name==='insight') rInsight();
}

// ── INIT ──
(()=>{ const s=load(); if(s.profile?.accent) applyTheme(s.profile.accent); })();
rToday();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js");}</script>
</body>
